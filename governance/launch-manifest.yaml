github_pages_same_origin_pack_delivery_permission: true
human_study_authorisation: false
provider_allowlist:
  - openai-codex-current-session
data_region_allowlist:
  - local-workspace
  - public-internet-official-sources
ceilings:
  external_paid_model_cost_gbp: 0
  external_paid_model_tokens: 0
  official_source_requests: 1000000
  minimum_free_disk_gib: 10
  wall_time_hours: null
  wall_time_status: no_numeric_user_ceiling_recorded
  product_session_usage: product_managed_not_exposed
execution_approval:
  unattended_repo_work: authorised
  public_source_access: authorised_with_policy_and_rate_limits
  paid_external_model_api: not_authorised
  product_session_usage_ceiling: product_managed_not_exposed
  product_usage_reset_reported_by_user_date: "2026-07-12"
  interpretation: A product usage reset permits this task to continue while the product allows; it is not authority for paid API calls, a numeric token claim or unlimited spend.
rate_limits:
  content-api.publishing.service.gov.uk_requests_per_second: 8
  www.gov.uk_requests_per_second: 2
  other_hosts_requests_per_second: 2
  overall_other_hosts_requests_per_second: 8
notes:
  - No external paid model fan-out is authorised; deterministic generation and the current Codex session remain available.
  - Product-session tokens, exact backend build, parameters and marginal cost are not exposed; record them as unavailable rather than zero.
  - The official-source request ceiling is an execution-approval limit and is accounted separately from model usage and cost.
  - At least 10 GiB must remain free on every active repository or cache filesystem after each reserved write; this replaces the former 10 GiB retained-metadata ceiling.
  - A mounted EXTSSD or ExtSSD-Data volume is authorised for resumable acquisition caches and a local-only Search part extract database under okf-govuk-content/.
  - Search parts.body values are truncated search extracts for local concept/topic/relationship analysis; they are excluded from the checked-in and published corpus, and complete page bodies remain out of scope.
  - The explicit request authorises public repository, Pages, release and registry publication.
  - Repository-native GitHub Release assets are authorised as the immutable offline mirror; they are not external storage and are not a browser CORS fallback.
  - GitHub Pages range-pack delivery remains subject to the 950,000,000-byte fail-closed package gate.
  - Genuine participant research remains blocked pending ethics, recruitment and consent authority.
