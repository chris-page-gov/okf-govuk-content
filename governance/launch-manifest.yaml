schema_version: 1
recorded_date: "2026-07-15"
authority_basis: explicit user instructions in the initiating task and the 15 July 2026 bulk-first migration instruction
publication_authorisation: true
authenticated_source_permission: false
external_storage_permission: true
external_cache_required_for_body_extracts: true
external_cache_relative_path: okf-govuk-content
