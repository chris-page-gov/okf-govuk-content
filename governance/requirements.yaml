      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Measure human task success, time, errors, backtracking, reformulations, click depth, comprehension and preference."
    },
    {
      "clause_ids": [
        "BRIEF-003",
        "PROMPT-001",
        "PROMPT-004",
        "PROMPT-008"
      ],
      "id": "REQ-074",
      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Test accessibility against WCAG 2.2 AA using automation, expert review and representative users where available."
    },
    {
      "clause_ids": [
        "BRIEF-003",
        "BRIEF-010",
        "PROMPT-001",
        "PROMPT-004",
        "PROMPT-008"
      ],
      "id": "REQ-075",
      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Audit Explorer's reader, search, facets, graph, links, type, timeline, resources and narrative behaviours."
    },
    {
      "clause_ids": [
        "BRIEF-003",
        "PROMPT-001",
        "PROMPT-004",
        "PROMPT-008"
      ],
      "id": "REQ-076",
      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Turn every evidenced UI gap into a prioritised change with affected stories, rationale, component, acceptance test and dependency."
    },
    {
      "clause_ids": [
        "BRIEF-003",
        "PROMPT-001",
        "PROMPT-004",
        "PROMPT-008"
      ],
      "id": "REQ-077",
      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Pre-register “UI of choice” for defined people and tasks and do not infer it from agent or synthetic tests."
    },
    {
      "clause_ids": [
        "BRIEF-003",
        "PROMPT-001",
        "PROMPT-005",
        "PROMPT-008"
      ],
      "id": "REQ-078",
      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Conduct a reproducible review of comparable government catalogues, knowledge graphs, linked-data portals, content APIs, search systems, data catalogues and agent/GraphRAG discovery layers."
    },
    {
      "clause_ids": [
        "BRIEF-003",
        "PROMPT-001",
        "PROMPT-005",
        "PROMPT-008"
      ],
      "id": "REQ-079",
      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Compare purpose, scope, semantics, acquisition, provenance, freshness, scale, agent interface, human UI, governance and published evidence."
    },
    {
      "clause_ids": [
        "BRIEF-003",
        "BRIEF-010",
        "PROMPT-001",
        "PROMPT-006",
        "PROMPT-008"
      ],
      "id": "REQ-080",
      "section": "Evaluation, UI and comparison",
      "status": "accepted",
      "text": "Assess each stated aim independently as fulfilled, partly fulfilled, not fulfilled or not yet testable, with evidence and confidence."
    },
    {
      "clause_ids": [
        "PROMPT-005",
        "PROMPT-009"
      ],
      "id": "REQ-081",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Use a dated SOTA protocol with reproducible searches, inclusion/exclusion rules and primary-source preference."
    },
    {
      "clause_ids": [
        "PROMPT-005",
        "PROMPT-009"
      ],
      "id": "REQ-082",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Maintain a complete bibliography with direct URLs wherever available."
    },
    {
      "clause_ids": [
        "PROMPT-005",
        "PROMPT-009"
      ],
      "id": "REQ-083",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Give each citation its strongest stable locator: PDF page/section; repository commit/path/lines; HTML heading plus paragraph ordinal and snapshot; or API JSON Pointer."
    },
    {
      "clause_ids": [
        "PROMPT-005",
        "PROMPT-009"
      ],
      "id": "REQ-084",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Verify every citation's URL, redirect destination, source identity, locator and semantic support for the linked claim."
    },
    {
      "clause_ids": [
        "BRIEF-008",
        "PROMPT-005",
        "PROMPT-009"
      ],
      "id": "REQ-085",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Record retrieval date, version/commit, content hash and a lawful evidence snapshot where feasible."
    },
    {
      "clause_ids": [
        "BRIEF-011",
        "PROMPT-007"
      ],
      "id": "REQ-086",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Express implementation as a dependency-aware multi-agent DAG with safe parallel workstreams."
    },
    {
      "clause_ids": [
        "BRIEF-011",
        "PROMPT-007"
      ],
      "id": "REQ-087",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Assign model tiers by task: browsing/research, frontier synthesis/ontology, coding, economical constrained generation and independent adjudication."
    },
    {
      "clause_ids": [
        "BRIEF-011",
        "PROMPT-007"
      ],
      "id": "REQ-088",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Use deterministic code—not an LLM—for counts, schema checks, hashes, URL checks, deduplication and metric calculation."
    },
    {
      "clause_ids": [
        "BRIEF-011",
        "PROMPT-007"
      ],
      "id": "REQ-089",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Give every agent a bounded input/output schema, source policy, budget, retry rule, completion gate and escalation condition."
    },
    {
      "clause_ids": [
        "BRIEF-011",
        "PROMPT-007"
      ],
      "id": "REQ-090",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Make runs resumable and idempotent using checkpoints, immutable manifests and content-addressed artefacts."
    },
    {
      "clause_ids": [
        "BRIEF-011",
        "PROMPT-007",
        "PROMPT-008"
      ],
      "id": "REQ-091",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Record prompts, exact model/version, parameters, tool calls, timestamps, source snapshots, outputs, validation and cost."
    },
    {
      "clause_ids": [
        "BRIEF-011",
        "PROMPT-007"
      ],
      "id": "REQ-092",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Prevent the same model/run from being the sole generator and judge of evidence, questions or conclusions."
    },
    {
      "clause_ids": [
        "BRIEF-006",
        "BRIEF-011",
        "PROMPT-007"
      ],
      "id": "REQ-093",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Fail closed on the affected scope for unresolved access, rights, robots, security, citation or completeness issues; continue independent workstreams safely."
    },
    {
      "clause_ids": [
        "BRIEF-006",
        "PROMPT-008"
      ],
      "id": "REQ-094",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Record decisions, design changes, commits, tests, evaluations, failures and waivers in human- and machine-readable forms."
    },
    {
      "clause_ids": [
        "BRIEF-006",
        "PROMPT-006",
        "PROMPT-008"
      ],
      "id": "REQ-095",
      "section": "Evidence and unattended execution",
      "status": "accepted",
      "text": "Produce a final machine-readable status report mapping every requirement to tests, evidence, exceptions and unresolved dependencies."
    }
  ],
