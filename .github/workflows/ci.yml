name: OKF bundle CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python3 -m pip install uv==0.11.8
      - run: uv sync --frozen --cache-dir .tmp/uv-cache
      - run: npm ci --prefix semantic
      - run: .venv/bin/python -m unittest discover -s tests -v
      - run: .venv/bin/python scripts/import_contract.py --check
      - run: .venv/bin/python scripts/run_controller.py check
      - run: .venv/bin/python scripts/check_repository_policy.py
      - run: .venv/bin/python scripts/preflight_sources.py --check
      - run: .venv/bin/python scripts/build_research_assets.py --check
      - run: .venv/bin/python scripts/verify_citations.py collect --check
      - run: .venv/bin/python scripts/build_walkthrough_inventory.py --check
      - run: .venv/bin/python scripts/check_persona_saturation.py
      - run: .venv/bin/python scripts/build_status_projections.py --check
      - run: .venv/bin/python scripts/build_aim_scorecard.py --check
      - name: Snapshot-aware deterministic reproduction gate
        run: .venv/bin/python scripts/check_ci_snapshot.py
      - run: .venv/bin/python scripts/check_publication.py
      - run: .venv/bin/python scripts/build_checksums.py --check
      - run: .venv/bin/python scripts/build_sbom.py --check
      - run: .venv/bin/python scripts/check_provenance.py
      - run: .venv/bin/python scripts/validate_semantics.py --require-shard-metadata --check
      - run: .venv/bin/python scripts/audit_rights_privacy.py --check --allow-archived-inputs
      - run: npm test --prefix explorer
      - name: Real-browser Explorer gate
        run: npm run test:browser --prefix explorer
      - run: npm test --prefix semantic
      - run: .venv/bin/python scripts/check_lockstep.py
      - name: Clean bounded-demonstrator generation
        run: .venv/bin/python scripts/build_bundle.py --source demo/snapshots/NEW-CHILD-20260715/publication/source-records.jsonl --output "$RUNNER_TEMP/bundle" --generated-at 2026-07-15T06:25:17Z --snapshot-id NEW-CHILD-20260715
      - run: git diff --check
