name: OKF bundle CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s tests -v
      - run: python3 scripts/import_contract.py --check
      - run: python3 scripts/run_controller.py check
      - run: python3 scripts/preflight_sources.py --check
      - run: python3 scripts/check_lockstep.py
      - run: git diff --check
